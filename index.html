<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>ABYSS SOCIETY — EST. 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --c: #1a4fbf;
            --w: #f0f0f0;
            --k: #060608;
            --s: #0d0d0f;
            --bd: #1c1c1e;
            --g: #484848;
            --or: #e67e22;
            --gr: #2ecc71;
            --rd: #c0392b;
            --nav-h: 64px;
        }
        html,
        body {
            background: var(--k);
            color: var(--w);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        a,
        button,
        [onclick] {
            cursor: pointer;
        }

        /* NAV */
        #nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            z-index: 400;
            display: flex;
            align-items: center;
            padding: 0 36px;
            gap: 28px;
            background: rgba(6, 6, 8, 0.96);
            border-bottom: 1px solid var(--bd);
            backdrop-filter: blur(16px);
        }
        .nav-logo {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 0.26em;
            color: var(--w);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-logo small {
            font-size: 7px;
            letter-spacing: 0.48em;
            color: var(--c);
            display: block;
            margin-top: -2px;
            font-family: 'Courier New', Courier, monospace;
        }
        #nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
            flex: 1;
        }
        #nav-links a {
            font-size: 9px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--g);
            cursor: pointer;
            transition: color 0.18s;
            text-decoration: none;
        }
        #nav-links a:hover {
            color: var(--w);
        }
        #nav-r {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .lg {
            display: flex;
            border: 1px solid var(--bd);
            border-radius: 2px;
            overflow: hidden;
        }
        .lb {
            font-size: 8px;
            letter-spacing: 0.2em;
            color: var(--g);
            cursor: pointer;
            padding: 6px 10px;
            background: transparent;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.16s;
        }
        .lb.on {
            background: var(--c);
            color: var(--k);
        }
        .nic {
            position: relative;
            width: 34px;
            height: 34px;
            border: 1px solid var(--bd);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--g);
            font-size: 15px;
            transition: all 0.16s;
            background: transparent;
        }
        .nic:hover {
            border-color: var(--c);
            color: var(--w);
        }
        .nbadge {
            position: absolute;
            top: -5px;
            right: -5px;
            min-width: 16px;
            height: 16px;
            padding: 0 3px;
            background: var(--c);
            border-radius: 8px;
            font-size: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--k);
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s;
            line-height: 1;
        }
        .nbadge.on {
            opacity: 1;
        }
        .nav-cta {
            font-size: 9px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--c);
            border: 1px solid var(--c);
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.18s;
            background: transparent;
        }
        .nav-cta:hover {
            background: var(--c);
            color: var(--k);
        }

        /* PROGRESS */
        #prog {
            position: fixed;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 200;
        }
        .pd {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--g);
            cursor: pointer;
            transition: all 0.28s;
        }
        .pd.on {
            background: var(--c);
            transform: scale(2.2);
        }

        /* SCENES */
        .sc {
            position: fixed !important;
            top: var(--nav-h);
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            overflow-y: auto;
            padding: 20px 20px 60px;
        }
        .sc.on {
            opacity: 1;
            pointer-events: all;
        }
        #s0 {
            top: 0;
            padding: 0;
            overflow: hidden;
        }

        /* S0 HERO */
        #s0 {
            overflow: hidden;
            z-index: 11;
        }
        #slides-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            transition: opacity 1.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--k);
        }
        .slide.on {
            opacity: 1;
        }
        .slide-content {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(48px, 10vw, 120px);
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-align: center;
        }
        .slide-content small {
            display: block;
            font-size: 0.3em;
            letter-spacing: 0.5em;
            color: rgba(255, 255, 255, 0.03);
        }
        .sl-arr {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 52px;
            height: 52px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            background: rgba(6, 6, 8, 0.3);
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        .sl-arr:hover {
            border-color: rgba(26, 79, 191, 0.7);
            color: #fff;
            background: rgba(26, 79, 191, 0.2);
        }
        #sl-prev {
            left: 20px;
        }
        #sl-next {
            right: 20px;
        }
        #sl-dots {
            position: absolute;
            bottom: 76px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
        }
        .sldot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.22s;
        }
        .sldot.on {
            background: var(--c);
            transform: scale(1.8);
        }
        #sl-tag {
            position: absolute;
            bottom: 64px;
            right: 24px;
            z-index: 20;
            font-size: 7px;
            letter-spacing: 0.28em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }
        #hero-txt {
            position: relative;
            z-index: 15;
            text-align: center;
            background: radial-gradient(ellipse at 50% 50%, rgba(6, 6, 8, 0.7) 0%, transparent 70%);
            padding: 48px 60px 80px;
            pointer-events: none;
        }
        .h-title {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(48px, 14vw, 195px);
            letter-spacing: 0.06em;
            line-height: 0.87;
            animation: hfloat 6s ease-in-out infinite;
        }
        @keyframes hfloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .h-sub {
            font-size: clamp(7px, 0.9vw, 10px);
            letter-spacing: 0.5em;
            color: var(--c);
            text-transform: uppercase;
            margin-top: 14px;
        }
        .h-tag {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: clamp(14px, 1.5vw, 18px);
            color: rgba(240, 240, 240, 0.28);
            margin-top: 22px;
        }
        .h-enter {
            margin-top: 42px;
            font-size: 8px;
            letter-spacing: 0.46em;
            text-transform: uppercase;
            color: var(--c);
            cursor: pointer;
            display: inline-block;
            pointer-events: all;
            border: 1px solid rgba(26, 79, 191, 0.4);
            padding: 12px 24px;
            transition: all 0.22s;
            background: transparent;
        }
        .h-enter:hover {
            background: var(--c);
            color: var(--k);
            border-color: var(--c);
        }
        #hscroll {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 20;
        }
        #hscroll span {
            font-size: 7px;
            letter-spacing: 0.36em;
            color: var(--g);
            text-transform: uppercase;
        }
        .sln {
            width: 1px;
            height: 36px;
            background: linear-gradient(to bottom, var(--c), transparent);
            animation: sp 1.6s ease-in-out infinite;
        }
        @keyframes sp {
            0% {
                transform: scaleY(0);
                transform-origin: top;
            }
            49% {
                transform: scaleY(1);
                transform-origin: top;
            }
            50% {
                transform: scaleY(1);
                transform-origin: bottom;
            }
            100% {
                transform: scaleY(0);
                transform-origin: bottom;
            }
        }

        /* S1 COLLECTION */
        #s1 {
            flex-direction: column;
            overflow: hidden;
            min-height: 100vh;
            padding-top: var(--nav-h);
        }
        .col-hdr {
            position: absolute;
            top: 16px;
            left: 42px;
            right: 42px;
            z-index: 20;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .col-ttl {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(26px, 3.5vw, 42px);
            letter-spacing: 0.1em;
        }
        .col-meta {
            font-size: 8px;
            letter-spacing: 0.25em;
            color: var(--g);
            text-transform: uppercase;
        }
        .col-meta b {
            color: var(--c);
        }
        .ftabs {
            position: absolute;
            top: 72px;
            left: 42px;
            display: flex;
            gap: 4px;
            z-index: 20;
            flex-wrap: wrap;
        }
        .ftab {
            font-size: 7.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid var(--bd);
            color: var(--g);
            cursor: pointer;
            transition: all 0.18s;
            background: transparent;
        }
        .ftab.on {
            border-color: var(--c);
            color: var(--w);
            background: rgba(26, 79, 191, 0.13);
        }
        .rail {
            position: absolute;
            top: 116px;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            gap: 12px;
            padding: 0 42px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            align-items: center;
            justify-content: flex-start;
        }
        .rail::-webkit-scrollbar {
            display: none;
        }
        .mc {
            flex: 0 0 auto;
            width: clamp(160px, 16vw, 220px);
            background: var(--s);
            border: 1px solid var(--bd);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.24s, transform 0.24s;
        }
        .mc:hover {
            border-color: var(--c);
            transform: translateY(-5px);
        }
        .mb {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
            font-size: 6px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            padding: 3px 8px;
            border: 1px solid var(--c);
            color: var(--c);
            background: rgba(6, 6, 8, 0.85);
        }
        .mb.nb {
            border-color: var(--gr);
            color: var(--gr);
        }
        .mb.lb {
            border-color: var(--or);
            color: var(--or);
        }
        .mb.sold {
            border-color: #888;
            color: #888;
        }
        .mv {
            width: 100%;
            aspect-ratio: 3/4;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090b;
            position: relative;
            overflow: hidden;
        }
        .mv svg {
            width: 74%;
            transition: transform 0.34s ease;
            max-height: 100%;
        }
        .mc:hover .mv svg {
            transform: scale(1.04);
        }
        .mc-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 6, 8, 0.75);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(3px);
        }
        .mc:hover .mc-overlay {
            opacity: 1;
        }
        .mc-overlay span {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(16px, 2vw, 24px);
            letter-spacing: 0.1em;
            color: var(--w);
            margin-bottom: 6px;
            text-align: center;
            padding: 0 10px;
        }
        .mc-overlay small {
            font-size: 7px;
            letter-spacing: 0.2em;
            color: var(--c);
            text-transform: uppercase;
        }
        .mi {
            padding: 12px 14px 14px;
            border-top: 1px solid var(--bd);
        }
        .mn {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: 15px;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }
        .mr {
            font-size: 7px;
            letter-spacing: 0.18em;
            color: var(--g);
            margin-bottom: 8px;
        }
        .mf {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mp {
            font-size: 14px;
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            letter-spacing: 0.08em;
        }
        .mst {
            font-size: 7px;
            letter-spacing: 0.17em;
            color: var(--c);
            text-transform: uppercase;
        }
        .mst.lo {
            color: var(--or);
        }
        .mst.sold {
            color: #888;
        }
        .madd {
            width: 24px;
            height: 24px;
            border: 1px solid var(--c);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--c);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.14s;
            flex-shrink: 0;
            background: transparent;
        }
        .madd:hover {
            background: var(--c);
            color: var(--k);
        }
        .rcnt {
            position: absolute;
            bottom: 16px;
            left: 42px;
            font-size: 7px;
            letter-spacing: 0.22em;
            color: var(--g);
        }
        .rcnt b {
            color: var(--w);
        }

        /* S2 HOODS */
        #s2 {
            flex-direction: column;
            min-height: 100vh;
            padding: var(--nav-h) 20px 60px;
        }
        .w-eyebrow {
            font-size: 8px;
            letter-spacing: 0.44em;
            color: var(--c);
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
        }
        .w-title {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(13px, 2.2vw, 20px);
            letter-spacing: 0.5em;
            color: var(--g);
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
        }
        .w-grid {
            display: flex;
            gap: 3px;
            width: 88vw;
            max-width: 1060px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .wc {
            flex: 1;
            min-width: 220px;
            max-width: 340px;
            border: 1px solid var(--bd);
            padding: 32px 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.36s;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .wc:hover {
            border-color: var(--c);
        }
        .wc::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.92) 0%, transparent 60%);
            z-index: 1;
        }
        .wc::after {
            content: attr(data-n);
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 7px;
            letter-spacing: 0.24em;
            color: var(--g);
            z-index: 2;
        }
        .wbg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: 190px;
            color: rgba(255, 255, 255, 0.015);
            z-index: 0;
            transition: transform 0.44s, color 0.44s;
        }
        .wc:hover .wbg {
            transform: scale(1.06);
            color: rgba(26, 79, 191, 0.036);
        }
        .wcon {
            position: relative;
            z-index: 2;
        }
        .wtag {
            display: inline-block;
            font-size: 7px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--c);
            border-top: 1px solid var(--c);
            padding-top: 6px;
            margin-bottom: 8px;
        }
        .wname {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: 40px;
            letter-spacing: 0.12em;
            margin-bottom: 4px;
        }
        .wdesc {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: 12px;
            color: var(--g);
            line-height: 1.6;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.36s;
        }
        .wc:hover .wdesc {
            max-height: 80px;
            color: rgba(240, 240, 240, 0.48);
        }

        /* S3 DROP */
        #s3 {
            flex-direction: column;
            min-height: 100vh;
            padding: var(--nav-h) 20px 60px;
            position: relative;
        }
        .drop-intro {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--k);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .drop-intro.active {
            opacity: 1;
            pointer-events: all;
        }
        .drop-intro.exit {
            opacity: 0;
            transform: translateY(-30px);
        }
        .drop-intro-content {
            text-align: center;
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
        }
        .drop-intro-content .big {
            font-size: clamp(48px, 10vw, 140px);
            letter-spacing: 0.15em;
            color: var(--c);
            line-height: 1;
        }
        .drop-intro-content .sub {
            font-size: clamp(12px, 2vw, 22px);
            letter-spacing: 0.5em;
            color: var(--g);
            text-transform: uppercase;
            margin-top: 12px;
        }
        .drop-main {
            z-index: 6;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
        }
        .drop-main.visible {
            opacity: 1;
        }
        .d-eye {
            font-size: 8px;
            letter-spacing: 0.44em;
            color: var(--c);
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
        }
        .d-ttl {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(44px, 7.5vw, 92px);
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            text-align: center;
        }
        .d-sub {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            color: var(--g);
            font-size: 14px;
            margin-bottom: 36px;
            text-align: center;
        }
        .d-grid {
            display: flex;
            gap: 12px;
            width: 84vw;
            max-width: 940px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .dc {
            flex: 1;
            min-width: 190px;
            max-width: 290px;
            background: var(--s);
            border: 1px solid var(--bd);
            padding: 20px 16px;
            cursor: pointer;
            transition: border-color 0.22s;
        }
        .dc:hover {
            border-color: var(--c);
        }
        .dv2 {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .dv2 svg {
            width: 75%;
            transition: transform 0.28s;
            max-height: 100%;
        }
        .dc:hover .dv2 svg {
            transform: scale(1.03);
        }
        .dn2 {
            font-family: 'Impact', 'Arial Narrow', Arial, sans-serif;
            font-size: 14px;
